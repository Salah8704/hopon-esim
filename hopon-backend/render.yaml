services:
  - type: web
    name: hopon-backend
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: OCS_BASE_URL
        value: https://ocs.transatel.com
      # Les autres variables sont à renseigner dans le dashboard Render
      - key: DATABASE_URL
        fromDatabase:
          name: hopon-db
          property: connectionString
databases:
  - name: hopon-db
    databaseName: hopon_db
    user: hopon_user
    region: frankfurt
    plan: free
